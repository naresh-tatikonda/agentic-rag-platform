# .github/workflows/ci.yml
# =============================================================================
# CI/CD Pipeline — Agentic RAG Platform
#
# Trigger: every push to main or PR targeting main
#
# Jobs (in order — each blocks the next on failure):
#   1. test        → pytest unit + integration tests
#   2. ragas-eval  → RAGAS faithfulness quality gate against live container
#   3. docker-push → Build & push image to GHCR (only if 1 & 2 pass)
# =============================================================================

name: CI Quality Gate + Deploy

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Unit + Integration Tests ────────────────────────────────────────
  test:
    name: pytest
    runs-on: ubuntu-latest

    services:
      # Spin up pgvector for integration tests
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER:     user
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          POSTGRES_DB:       ragdb
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest
        env:
          DATABASE_URL: postgresql://user:${{ secrets.POSTGRES_PASSWORD }}@localhost:5432/ragdb
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          pytest tests/ -v \
            --tb=short \
            --junitxml=reports/pytest.xml

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pytest-report
          path: reports/pytest.xml

  # ── Job 2: RAGAS Faithfulness Quality Gate ─────────────────────────────────
  ragas-eval:
    name: RAGAS Quality Gate
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create docker network
        run: docker network create rag-net

      - name: Start pgvector
        run: |
          docker run -d \
            --name ragdb \
            --network rag-net \
            -e POSTGRES_USER=user \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=ragdb \
            -p 5432:5432 \
            pgvector/pgvector:pg16
          # Wait for postgres to be ready
          for i in $(seq 1 15); do
            docker exec ragdb pg_isready -U user -d ragdb && break
            echo "  waiting for postgres... $i/15"
            sleep 3
          done

      - name: Build RAG API image from source
        run: docker build -t rag-api-ci:latest .

      - name: Start RAG API
        run: |
          docker run -d \
            --name rag-api \
            --network rag-net \
            -e OPENAI_API_KEY=${{ secrets.OPENAI_API_KEY }} \
            -e LANGCHAIN_API_KEY=${{ secrets.LANGCHAIN_API_KEY }} \
            -e LANGCHAIN_TRACING_V2=true \
            -e LANGCHAIN_PROJECT=agentic-rag-platform \
            -e DATABASE_URL=postgresql://user:${{ secrets.POSTGRES_PASSWORD }}@ragdb:5432/ragdb \
            -e POSTGRES_USER=user \
            -e POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }} \
            -e POSTGRES_DB=ragdb \
            -e POSTGRES_HOST=ragdb \
            -e POSTGRES_PORT=5432 \
            -e API_KEY=${{ secrets.RAG_API_KEY }} \
            -e PORT=8000 \
            -p 8000:8000 \
            rag-api-ci:latest
      - name: Debug — show container status and logs
        if: always()
        run: |
          echo "=== Container status ==="
          docker ps -a
          echo "=== rag-api logs ==="
          docker logs rag-api --tail 50
          echo "=== ragdb logs ==="
          docker logs ragdb --tail 20  

      - name: Wait for API healthy
        run: |
          for i in $(seq 1 24); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000/health 2>/dev/null || echo "000")
            if [ "$STATUS" = "200" ]; then
              echo "✅ API healthy after ${i}x5s"
              exit 0
            fi
            echo "  attempt $i/24 (status=$STATUS)"
            sleep 5
          done
          echo "❌ API never became healthy"
          docker logs rag-api --tail 30
          exit 1

      - name: Run RAGAS faithfulness eval
        env:
          API_BASE_URL:                 http://localhost:8000
          API_KEY:                      ${{ secrets.RAG_API_KEY }}
          OPENAI_API_KEY:               ${{ secrets.OPENAI_API_KEY }}
          RAGAS_FAITHFULNESS_THRESHOLD: "0.7"
        run: python scripts/ci_ragas_eval.py

      - name: Tear down
        if: always()
        run: |
          docker stop rag-api ragdb || true
          docker rm   rag-api ragdb || true
          docker network rm rag-net  || true

  # ── Job 3: Build + Push to GHCR ────────────────────────────────────────────
  docker-push:
    name: Build & Push GHCR
    runs-on: ubuntu-latest
    needs: [test, ragas-eval]

    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    permissions:
      contents: read
      packages: write      # required to push to GHCR

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}   # auto-injected — no secret to add

      - name: Build, tag, and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.sha }}
            ghcr.io/${{ github.repository }}:latest

      - name: Output deployed image URI
        run: |
          echo "🚀 Deployed: ghcr.io/${{ github.repository }}:${{ github.sha }}"