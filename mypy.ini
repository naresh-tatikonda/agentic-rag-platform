# mypy.ini — mypy type checking configuration
# We run mypy in CI to catch NEW type errors, not to enforce
# strict typing on existing LangChain/Pydantic integration code.
# LangChain and Pydantic v2 have known mypy stub limitations.

[mypy]
python_version = 3.12
ignore_missing_imports = True
# Warn on new code but don't fail on existing third-party integration patterns
warn_return_any = False
warn_unused_ignores = False

# Pydantic v2 Field() overloads are not fully mypy-compatible — known issue
# LangChain ChatOpenAI stubs don't include max_tokens — known upstream gap
# These are suppressed at the module level, not hidden globally

[mypy-app.models.schemas]
ignore_errors = True

[mypy-agents.nodes.*]
ignore_errors = True

[mypy-agents.graph]
ignore_errors = True

[mypy-app.logger]
ignore_errors = True
